<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DuraLack Beschichtungssysteme — Bald verfügbar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --navy: #0E1B2C;
    --navy-2: #142438;
    --ink: #0B1422;
    --paper: #F6F4EF;
    --paper-2: #FBFAF6;
    --line: #E3DFD5;
    --muted: #6B7280;
    --amber: #C8932A;
    --amber-2: #B07E1E;
    --steel: #8B96A3;
  }
  html, body { background: var(--paper); }
  body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .tracked { letter-spacing: 0.14em; }
  .tracked-wide { letter-spacing: 0.22em; }
  .tick { background-image: linear-gradient(to right, var(--line) 1px, transparent 1px); background-size: 8px 1px; background-repeat: repeat-x; }
  .hairline { border-color: var(--line); }
  .focus-ring:focus { outline: none; box-shadow: 0 0 0 2px var(--paper), 0 0 0 4px var(--accent, var(--amber)); }
  /* Subtle grain */
  .grain::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: .04;
    background-image: radial-gradient(rgba(0,0,0,.8) 1px, transparent 1px);
    background-size: 3px 3px;
  }
  /* Dark theme */
  [data-theme="dark"] { --paper: #0B1422; --paper-2: #0E1B2C; --ink: #EDE9DE; --line: #223247; --muted: #8B96A3; }
  [data-theme="dark"] body { background: var(--paper); }
  /* accent variants */
  [data-accent="steel"] { --accent: #8B96A3; --accent-2: #6B7785; }
  [data-accent="navy"] { --accent: #0E1B2C; --accent-2: #142438; }
  [data-accent="amber"], :root { --accent: #C8932A; --accent-2: #B07E1E; }
  [data-theme="dark"][data-accent="navy"] { --accent: #EDE9DE; --accent-2: #CFC9B8; }

  /* Density */
  [data-density="compact"] .pad-y { padding-top: 2.5rem; padding-bottom: 2.5rem; }
  [data-density="comfortable"] .pad-y { padding-top: 4rem; padding-bottom: 4rem; }
  [data-density="spacious"] .pad-y { padding-top: 6rem; padding-bottom: 6rem; }

  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: #000; }
  [data-theme="dark"] .btn-primary { background: var(--accent); color: var(--ink); }
  [data-theme="dark"] .btn-primary:hover { background: var(--accent-2); }

  .input-field {
    background: transparent; border: 1px solid var(--line); color: var(--ink);
  }
  .input-field::placeholder { color: var(--muted); }

  .card {
    background: var(--paper-2);
    border: 1px solid var(--line);
  }
  .card:hover { border-color: color-mix(in srgb, var(--ink) 30%, var(--line)); }

  .accent-bar { background: var(--accent); }

  /* Tweak panel */
  .tweak-panel { background: var(--paper-2); border: 1px solid var(--line); color: var(--ink); }
  .tweak-panel select, .tweak-panel input { background: var(--paper); border: 1px solid var(--line); color: var(--ink); }

  /* small chevron reset for select */
  select { appearance: none; -webkit-appearance: none; background-image: linear-gradient(45deg, transparent 50%, currentColor 50%), linear-gradient(135deg, currentColor 50%, transparent 50%); background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; padding-right: 28px; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useMemo } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "accent": "amber",
    "density": "spacious",
    "heroVariant": 0,
    "showPipeArt": false
  }/*EDITMODE-END*/;

  // ------------------- primitives -------------------
  function Button({ children, type = 'button', onClick, disabled, className = '' }) {
    return (
      <button
        type={type}
        onClick={onClick}
        disabled={disabled}
        className={`btn-primary focus-ring inline-flex items-center justify-center gap-2 px-5 h-12 text-[13px] font-medium tracked uppercase transition-colors disabled:opacity-50 disabled:cursor-not-allowed ${className}`}
      >
        {children}
      </button>
    );
  }

  function Input(props) {
    return (
      <input
        {...props}
        className={`input-field focus-ring h-12 px-4 text-[15px] w-full ${props.className || ''}`}
      />
    );
  }

  // ------------------- hero variants -------------------

  function HeroEyebrow() {
    return (
      <div className="flex items-center gap-3 mono text-[11px] tracked-wide uppercase" style={{color: 'var(--muted)'}}>
        <span className="inline-block w-6 h-px" style={{background: 'var(--accent)'}}></span>
        <span>Website im Aufbau · Launch Q3 2026</span>
      </div>
    );
  }

  function HeroV0({ showPipeArt }) {
    // Editorial / left-aligned
    return (
      <div className="grid md:grid-cols-12 gap-10 items-end">
        <div className="md:col-span-8">
          <HeroEyebrow />
          <h1 className="mt-6 text-[44px] md:text-[68px] leading-[1.02] font-semibold tracking-tight">
            Industrielle Beschichtungen,<br/>
            <span style={{color: 'var(--muted)'}}>präzise spezifiziert.</span>
          </h1>
          <p className="mt-7 max-w-xl text-[17px] leading-relaxed" style={{color: 'var(--muted)'}}>
            Für Rohrleitungen und Industrieanlagen in anspruchsvollen Umgebungen.
            In Kürze erreichbar über unsere neue Konfigurationsplattform.
          </p>
        </div>
        <div className="md:col-span-4">
          <SpecBlock />
        </div>
      </div>
    );
  }

  function HeroV1({ showPipeArt }) {
    // Centered
    return (
      <div className="text-center max-w-3xl mx-auto">
        <div className="flex justify-center"><HeroEyebrow /></div>
        <h1 className="mt-6 text-[44px] md:text-[72px] leading-[1.02] font-semibold tracking-tight">
          Industrielle Beschichtungen,<br/>
          <span style={{color: 'var(--muted)'}}>präzise spezifiziert.</span>
        </h1>
        <p className="mt-7 text-[17px] leading-relaxed max-w-xl mx-auto" style={{color: 'var(--muted)'}}>
          Für Rohrleitungen und Industrieanlagen in anspruchsvollen Umgebungen.
          In Kürze erreichbar über unsere neue Konfigurationsplattform.
        </p>
      </div>
    );
  }

  function HeroV2({ showPipeArt }) {
    // Split with big mark
    return (
      <div className="grid md:grid-cols-12 gap-10 items-center">
        <div className="md:col-span-7">
          <HeroEyebrow />
          <h1 className="mt-6 text-[40px] md:text-[60px] leading-[1.04] font-semibold tracking-tight">
            Präzise Beschichtungen für Rohrleitungen &amp; Industrieanlagen.
          </h1>
          <p className="mt-7 max-w-lg text-[17px] leading-relaxed" style={{color: 'var(--muted)'}}>
            Unsere Konfigurationsplattform führt Sie in wenigen Schritten vom Einsatzfall
            zur passenden Beschichtung — RAL-genau, normkonform, bestellbereit.
          </p>
        </div>
        <div className="md:col-span-5 flex justify-end">
          <img src="assets/logo-mark.png" alt="" className="w-[280px] h-[280px] object-contain opacity-95" />
        </div>
      </div>
    );
  }

  function SpecBlock() {
    const rows = [
      ['Sektor', 'Industrie · Rohrleitungsbau'],
      ['Norm', 'DIN EN ISO 12944'],
      ['Standort', 'Deutschland'],
      ['Status', 'In Vorbereitung'],
    ];
    return (
      <dl className="border-t hairline pt-5 space-y-3 text-[13px]">
        {rows.map(([k,v]) => (
          <div key={k} className="flex justify-between gap-6">
            <dt className="mono uppercase tracked text-[11px]" style={{color: 'var(--muted)'}}>{k}</dt>
            <dd className="text-right">{v}</dd>
          </div>
        ))}
      </dl>
    );
  }

  // ------------------- benefit cards -------------------
  const BENEFITS = [
    {
      n: '01',
      title: 'Auswahl nach RAL‑Farbe',
      body: 'Durchsuchen Sie den vollständigen RAL‑Katalog und filtern Sie nach Farbton, Glanzgrad und Verfügbarkeit.',
      icon: 'swatch',
    },
    {
      n: '02',
      title: 'Konfiguration für Einsatzbedingungen',
      body: 'Temperatur, Medium, Korrosivitätsklasse — in wenigen Schritten spezifiziert.',
      icon: 'sliders',
    },
    {
      n: '03',
      title: 'Empfehlung passender Systeme',
      body: 'Klare Empfehlung inklusive Grundierung, Zwischen‑ und Decklack nach DIN EN ISO 12944.',
      icon: 'layers',
    },
    {
      n: '04',
      title: 'Bestellung oder persönliche Beratung',
      body: 'Direkt anfragen oder im Zweifel Rückruf vom Anwendungstechniker anfordern.',
      icon: 'phone',
    },
  ];

  function Icon({ name }) {
    const common = { width: 22, height: 22, fill: 'none', stroke: 'currentColor', strokeWidth: 1.5, strokeLinecap: 'round', strokeLinejoin: 'round' };
    switch (name) {
      case 'swatch':
        return (<svg {...common} viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>);
      case 'sliders':
        return (<svg {...common} viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="9" cy="6" r="2" fill="var(--paper-2)"/><circle cx="15" cy="12" r="2" fill="var(--paper-2)"/><circle cx="8" cy="18" r="2" fill="var(--paper-2)"/></svg>);
      case 'layers':
        return (<svg {...common} viewBox="0 0 24 24"><path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="m3 13 9 5 9-5"/><path d="m3 18 9 5 9-5"/></svg>);
      case 'phone':
        return (<svg {...common} viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>);
      default: return null;
    }
  }

  function BenefitCard({ n, title, body, icon, index }) {
    return (
      <div className="card p-6 md:p-7 flex flex-col gap-5 transition-colors">
        <div className="flex items-start justify-between">
          <div className="flex items-center gap-3">
            <span className="mono text-[11px] tracked-wide" style={{color: 'var(--muted)'}}>{n}</span>
            <span className="block w-8 h-px" style={{background: 'var(--accent)'}}></span>
          </div>
          <div style={{color: 'var(--accent)'}}><Icon name={icon} /></div>
        </div>
        <div className="mt-2">
          <h3 className="text-[18px] font-semibold leading-snug">{title}</h3>
          <p className="mt-2 text-[14px] leading-relaxed" style={{color: 'var(--muted)'}}>{body}</p>
        </div>
      </div>
    );
  }

  // ------------------- email capture -------------------
  function EmailCapture() {
    const [email, setEmail] = useState('');
    const [status, setStatus] = useState('idle'); // idle | loading | ok | err
    const [err, setErr] = useState('');

    function submit(e) {
      e.preventDefault();
      const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
      if (!ok) { setErr('Bitte eine gültige E‑Mail‑Adresse eingeben.'); setStatus('err'); return; }
      setStatus('loading');
      setTimeout(() => setStatus('ok'), 700);
    }

    if (status === 'ok') {
      return (
        <div className="card p-6 md:p-8 flex items-start gap-4">
          <div className="mt-1 shrink-0 w-8 h-8 rounded-full flex items-center justify-center" style={{background: 'var(--accent)', color: 'var(--ink)'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div>
            <div className="mono uppercase tracked text-[11px]" style={{color: 'var(--muted)'}}>Eingetragen</div>
            <div className="mt-1 text-[16px] font-medium">Danke. Wir melden uns, sobald die Plattform live ist.</div>
            <div className="mt-1 text-[13px]" style={{color: 'var(--muted)'}}>Bestätigung an <span className="mono">{email}</span></div>
          </div>
        </div>
      );
    }

    return (
      <form onSubmit={submit} noValidate>
        <div className="flex flex-col sm:flex-row gap-3">
          <div className="flex-1">
            <label htmlFor="email" className="sr-only">E‑Mail</label>
            <Input
              id="email" name="email" type="email" inputMode="email" autoComplete="email"
              placeholder="ihre.adresse@unternehmen.de"
              value={email}
              onChange={e => { setEmail(e.target.value); if (status === 'err') { setStatus('idle'); setErr(''); } }}
            />
          </div>
          <Button type="submit" disabled={status === 'loading'} className="whitespace-nowrap">
            {status === 'loading' ? 'Wird gesendet…' : 'Benachrichtigen'}
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </Button>
        </div>
        <div className="mt-3 text-[13px] flex items-center gap-2" style={{color: status === 'err' ? '#B23A3A' : 'var(--muted)'}}>
          {status === 'err' ? (
            <span>{err}</span>
          ) : (
            <span>Wir informieren Sie, sobald die Plattform live ist. Keine Werbung.</span>
          )}
        </div>
      </form>
    );
  }

  // ------------------- optional pipe motif -------------------
  function PipeArt() {
    // A subtle technical cross-section of a coated pipe (schematic, not illustration).
    return (
      <div aria-hidden className="hidden md:flex items-center gap-6 mt-16 opacity-80">
        <div className="mono text-[10px] tracked-wide uppercase" style={{color: 'var(--muted)'}}>Fig. 01 · Schichtaufbau</div>
        <div className="flex-1 flex items-center gap-0">
          {[
            {w: 30, c: 'var(--ink)', label: 'Substrat'},
            {w: 14, c: 'var(--accent)', label: 'Grundierung'},
            {w: 18, c: 'color-mix(in srgb, var(--ink) 40%, var(--paper))', label: 'Zwischenlack'},
            {w: 22, c: 'color-mix(in srgb, var(--ink) 70%, var(--paper))', label: 'Decklack'},
          ].map((s, i) => (
            <div key={i} style={{width: `${s.w}%`, height: 10, background: s.c}} />
          ))}
        </div>
        <div className="mono text-[10px] tracked-wide uppercase" style={{color: 'var(--muted)'}}>DIN EN ISO 12944</div>
      </div>
    );
  }

  // ------------------- tweaks panel -------------------
  function TweaksPanel({ state, setState, visible }) {
    if (!visible) return null;
    const patch = (k, v) => {
      const next = { ...state, [k]: v };
      setState(next);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
    };
    const Row = ({ label, children }) => (
      <label className="flex items-center justify-between gap-4 text-[12px]">
        <span className="uppercase tracked mono text-[10px]" style={{color: 'var(--muted)'}}>{label}</span>
        <span className="flex-1 max-w-[160px]">{children}</span>
      </label>
    );
    return (
      <div className="tweak-panel fixed bottom-5 right-5 z-50 w-[320px] p-4 rounded-sm shadow-lg">
        <div className="flex items-center justify-between mb-3">
          <div className="mono uppercase tracked text-[11px]">Tweaks</div>
          <div className="mono text-[10px]" style={{color: 'var(--muted)'}}>DuraLack · Coming Soon</div>
        </div>
        <div className="space-y-2.5">
          <Row label="Theme">
            <select className="w-full h-8 px-2 text-[12px]" value={state.theme} onChange={e => patch('theme', e.target.value)}>
              <option value="light">Hell</option>
              <option value="dark">Dunkel</option>
            </select>
          </Row>
          <Row label="Akzent">
            <select className="w-full h-8 px-2 text-[12px]" value={state.accent} onChange={e => patch('accent', e.target.value)}>
              <option value="amber">Amber (Marke)</option>
              <option value="steel">Stahl</option>
              <option value="navy">Monochrom</option>
            </select>
          </Row>
          <Row label="Dichte">
            <select className="w-full h-8 px-2 text-[12px]" value={state.density} onChange={e => patch('density', e.target.value)}>
              <option value="compact">Kompakt</option>
              <option value="comfortable">Komfortabel</option>
              <option value="spacious">Großzügig</option>
            </select>
          </Row>
          <Row label="Hero‑Variante">
            <select className="w-full h-8 px-2 text-[12px]" value={state.heroVariant} onChange={e => patch('heroVariant', Number(e.target.value))}>
              <option value={0}>01 · Editorial</option>
              <option value={1}>02 · Zentriert</option>
              <option value={2}>03 · Mit Markenzeichen</option>
            </select>
          </Row>
          <Row label="Schichtaufbau‑Grafik">
            <select className="w-full h-8 px-2 text-[12px]" value={String(state.showPipeArt)} onChange={e => patch('showPipeArt', e.target.value === 'true')}>
              <option value="false">Aus</option>
              <option value="true">Ein</option>
            </select>
          </Row>
        </div>
      </div>
    );
  }

  // ------------------- app -------------------
  function App() {
    const [state, setState] = useState(TWEAK_DEFAULTS);
    const [tweakVisible, setTweakVisible] = useState(false);

    useEffect(() => {
      const onMsg = (e) => {
        if (!e.data) return;
        if (e.data.type === '__activate_edit_mode') setTweakVisible(true);
        if (e.data.type === '__deactivate_edit_mode') setTweakVisible(false);
      };
      window.addEventListener('message', onMsg);
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
      return () => window.removeEventListener('message', onMsg);
    }, []);

    useEffect(() => {
      document.documentElement.setAttribute('data-theme', state.theme);
      document.documentElement.setAttribute('data-accent', state.accent);
      document.documentElement.setAttribute('data-density', state.density);
    }, [state]);

    const Hero = [HeroV0, HeroV1, HeroV2][state.heroVariant] || HeroV0;

    const logoSrc = state.theme === 'dark' ? 'assets/logo-mark.png' : 'assets/logo-full.png';

    return (
      <div className="relative min-h-screen" style={{background: 'var(--paper)', color: 'var(--ink)'}} data-screen-label="Coming Soon">
        {/* top bar */}
        <header className="border-b hairline">
          <div className="max-w-6xl mx-auto px-6 md:px-10 h-16 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <img src="assets/logo-full.png" alt="DuraLack Beschichtungssysteme" className="h-7 w-auto" style={{filter: state.theme === 'dark' ? 'invert(1) hue-rotate(180deg) brightness(1.1)' : 'none'}} />
            </div>
            <div className="hidden md:flex items-center gap-6 mono text-[11px] tracked-wide uppercase" style={{color: 'var(--muted)'}}>
              <span className="inline-flex items-center gap-2">
                <span className="w-1.5 h-1.5 rounded-full animate-pulse" style={{background: 'var(--accent)'}}></span>
                In Vorbereitung
              </span>
              <span>DE · EN in Kürze</span>
            </div>
          </div>
        </header>

        {/* hero */}
        <section className="pad-y">
          <div className="max-w-6xl mx-auto px-6 md:px-10">
            <Hero showPipeArt={state.showPipeArt} />
            {state.showPipeArt && <PipeArt />}
          </div>
        </section>

        {/* benefits */}
        <section className="pb-4">
          <div className="max-w-6xl mx-auto px-6 md:px-10">
            <div className="flex items-end justify-between mb-8">
              <div>
                <div className="mono uppercase tracked text-[11px]" style={{color: 'var(--muted)'}}>Plattform · Leistungsumfang</div>
                <h2 className="mt-2 text-[22px] md:text-[26px] font-semibold tracking-tight">Vom Einsatzfall zur passenden Beschichtung.</h2>
              </div>
              <div className="hidden md:block mono text-[11px] tracked-wide uppercase" style={{color: 'var(--muted)'}}>
                04 Module
              </div>
            </div>
            <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
              {BENEFITS.map((b, i) => <BenefitCard key={b.n} {...b} index={i} />)}
            </div>
          </div>
        </section>

        {/* email capture */}
        <section className="pad-y">
          <div className="max-w-4xl mx-auto px-6 md:px-10">
            <div className="grid md:grid-cols-12 gap-8 items-start">
              <div className="md:col-span-5">
                <div className="mono uppercase tracked text-[11px]" style={{color: 'var(--muted)'}}>Launch‑Benachrichtigung</div>
                <h3 className="mt-2 text-[24px] md:text-[28px] font-semibold tracking-tight leading-tight">
                  Als Erste:r informiert, sobald die Plattform live ist.
                </h3>
              </div>
              <div className="md:col-span-7">
                <EmailCapture />
                <div className="mt-6 pt-6 border-t hairline grid grid-cols-3 gap-4 text-[12px]">
                  {[
                    ['Zertifiziert','ISO 9001'],
                    ['Standards','DIN EN ISO 12944'],
                    ['Kontakt','Mo–Fr, 08–17 Uhr'],
                  ].map(([k,v]) => (
                    <div key={k}>
                      <div className="mono uppercase tracked text-[10px]" style={{color: 'var(--muted)'}}>{k}</div>
                      <div className="mt-1">{v}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </section>

        {/* footer */}
        <footer className="border-t hairline">
          <div className="max-w-6xl mx-auto px-6 md:px-10 h-16 flex flex-col sm:flex-row items-center justify-between gap-2">
            <div className="mono text-[11px] tracked-wide uppercase" style={{color: 'var(--muted)'}}>
              © 2026 DuraLack Beschichtungssysteme
            </div>
            <div className="mono text-[11px] tracked-wide uppercase" style={{color: 'var(--muted)'}}>
              Website im Aufbau · Impressum folgt
            </div>
          </div>
        </footer>

        <TweaksPanel state={state} setState={setState} visible={tweakVisible} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
